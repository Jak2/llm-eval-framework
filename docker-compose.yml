version: "3.11"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llm_eval
      POSTGRES_USER: eval_user
      POSTGRES_PASSWORD: eval_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eval_user -d llm_eval"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports: ["8000:8000"]
    env_file: .env
    volumes: ["./:/app"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A src.workers.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    volumes: ["./:/app"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build: .
    command: streamlit run src/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports: ["8501:8501"]
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000/api
    depends_on: [api]

volumes:
  pgdata:
